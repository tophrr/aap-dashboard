<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acoustic ATCS Proxy Tuner</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; flex-wrap: wrap; }
    .header h1 { font-size: 16px; font-weight: 600; margin-right: auto; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .status-dot.green { background: #4ade80; }
    .status-dot.red { background: #f87171; }
    .status-dot.yellow { background: #facc15; }
    .btn { padding: 4px 12px; border: 1px solid #0f3460; border-radius: 4px; background: #0f3460; color: #e0e0e0; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .btn:hover { background: #1a4a8a; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.danger { border-color: #991b1b; background: #7f1d1d; }
    .btn.danger:hover { background: #991b1b; }
    select { padding: 4px 8px; border: 1px solid #0f3460; border-radius: 4px; background: #16213e; color: #e0e0e0; font-size: 12px; }

    /* Main area */
    .main-area { display: flex; flex: 1 1 auto; min-height: 0; overflow: hidden; }
    .graph-pane { flex: 1 1 auto; min-width: 0; min-height: 0; position: relative; overflow: hidden; }
    .log-pane { width: 340px; min-width: 200px; border-left: 1px solid #0f3460; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    .divider { width: 4px; cursor: col-resize; background: #0f3460; flex-shrink: 0; }
    .divider:hover { background: #1a4a8a; }

    /* Event log */
    .log-header { padding: 6px 10px; border-bottom: 1px solid #0f3460; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .log-content { flex: 1; overflow-y: auto; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; padding: 4px 8px; background: #0d1117; white-space: pre-wrap; word-break: break-all; }
    .log-content div { padding: 1px 0; border-bottom: 1px solid #1a1a2e; }

    /* State indicator */
    .state-indicator { display: flex; flex-shrink: 0; border-top: 1px solid #0f3460; }
    .state-box { flex: 1; padding: 8px 10px; text-align: center; min-width: 0; }
    .state-box + .state-box { border-left: 1px solid #0f3460; }
    .state-box .state-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin-bottom: 2px; }
    .state-box .state-name { font-size: 18px; font-weight: 700; }
    .state-box .state-time { font-size: 10px; color: #94a3b8; margin-top: 2px; font-family: 'Cascadia Code', 'Fira Code', monospace; }

    /* Controls bar */
    .controls-bar { display: flex; align-items: center; gap: 12px; padding: 6px 16px; background: #16213e; border-top: 1px solid #0f3460; border-bottom: 1px solid #0f3460; flex-shrink: 0; font-size: 12px; }

    /* Tabs & Parameters layout */
    .tabs-container { display: flex; flex-direction: column; width: 100%; background: #16213e; border-top: 1px solid #0f3460; flex-shrink: 0; }
    .tabs-header { display: flex; align-items: center; border-bottom: 1px solid #0f3460; padding: 4px 16px 0 16px; background: #111a30; }
    .tab-btn { background: none; border: none; padding: 8px 16px; font-size: 12px; color: #94a3b8; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s ease; margin-right: 8px; font-weight: 600; }
    .tab-btn:hover { color: #e0e0e0; border-bottom: 2px solid #3b82f6; }
    .tab-btn.active { color: #4ade80; border-bottom: 2px solid #4ade80; }
    .tab-content { display: none; flex-wrap: wrap; gap: 8px; padding: 12px 16px; background: #16213e; min-height: 120px; overflow-y: auto; overflow-x: hidden; max-height: 180px; width: 100%; box-sizing: border-box; }
    .tab-content.active { display: flex; }

    .param-card { background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; padding: 8px 12px; width: 200px; flex: 0 0 200px; box-sizing: border-box; }
    .param-card label { font-size: 10px; text-transform: uppercase; color: #94a3b8; font-weight: 600; }
    .param-input { background: #111a30; border: 1px solid #0f3460; color: #4ade80; border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 700; width: 65px; text-align: right; outline: none; transition: border-color 0.15s ease; }
    .param-input:focus { border-color: #4ade80; }
    .param-card input[type="range"] { width: 100%; height: 4px; appearance: none; background: #0f3460; border-radius: 2px; outline: none; margin-top: 8px; }
    .param-card input[type="range"]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #4ade80; cursor: pointer; }
    .param-card input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #4ade80; cursor: pointer; border: none; }
    .param-card.checkbox-card { display: flex; flex-direction: row; align-items: center; justify-content: space-between; min-height: 46px; }
    .param-card input[type="checkbox"] { width: 18px; height: 18px; accent-color: #4ade80; cursor: pointer; }

    .graph-pane #plotly-graph { width: 100%; height: 100%; min-width: 0; min-height: 0; }

    .section-label { color: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ Acoustic ATCS Proxy Tuner</h1>

    <span class="section-label">Serial</span>
    <select id="port-select" style="width:160px"><option value="">(select port)</option></select>
    <button class="btn" id="btn-connect">Connect</button>
    <button class="btn danger" id="btn-disconnect" disabled>Disconnect</button>
    <span id="serial-status" style="font-size:12px;color:#94a3b8">—</span>

    <span class="section-label" style="margin-left:8px">MQTT</span>
    <span class="status-dot red" id="mqtt-dot"></span>
    <span id="mqtt-label" style="font-size:12px">disconnected</span>
    <button class="btn" id="btn-mqtt-connect">Connect</button>
    <button class="btn danger" id="btn-mqtt-disconnect" disabled>Disconnect</button>
  </div>

  <div class="main-area">
    <div class="graph-pane">
      <div id="plotly-graph"></div>
    </div>
    <div class="divider" id="divider"></div>
    <div class="log-pane">
      <div class="log-header">
        <span>Event Log</span>
        <button class="btn" id="btn-clear-log" style="margin-left:auto">Clear</button>
        <label style="display:flex;align-items:center;gap:3px"><input type="checkbox" id="chk-autoscroll" checked> Auto</label>
      </div>
      <div class="log-content" id="log-content"></div>
      <div class="state-indicator">
        <div class="state-box" id="state-prev">
          <div class="state-label">Previous</div>
          <div class="state-name" id="state-prev-name">—</div>
          <div class="state-time" id="state-prev-time"></div>
        </div>
        <div class="state-box" id="state-curr">
          <div class="state-label">Current</div>
          <div class="state-name" id="state-curr-name">IDLE</div>
          <div class="state-time" id="state-curr-time"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls-bar">
    <label>Time Window:</label>
    <select id="window-select">
      <option value="5">5s</option>
      <option value="10">10s</option>
      <option value="30" selected>30s</option>
      <option value="60">60s</option>
      <option value="120">120s</option>
    </select>
    <label style="display:flex;align-items:center;gap:3px"><input type="checkbox" id="chk-autoscroll-graph" checked> AutoScroll</label>
    <button class="btn" id="btn-clear-data">Clear Data</button>
    <span id="data-points" style="color:#94a3b8;margin-left:auto">0 points</span>
  </div>

  <div class="tabs-container">
    <div class="tabs-header">
      <button class="tab-btn active" id="tab-btn-fsm">FSM Settings</button>
      <button class="tab-btn" id="tab-btn-dsp">DSP Settings</button>
      <button class="tab-btn" id="tab-btn-other">System Settings</button>
      <div style="margin-left:auto; display:flex; gap:8px; align-items:center; padding-bottom:4px;">
        <label style="display:flex; align-items:center; gap:4px; font-size:11px; margin-right:8px; cursor:pointer; color:#94a3b8; user-select:none;">
          <input type="checkbox" id="header-debug-enabled" style="width:14px; height:14px; accent-color:#4ade80; cursor:pointer;">
          <span>Debug Logs</span>
        </label>
        <button class="btn" id="btn-refresh" style="background:#1e3a8a;border-color:#3b82f6">Refresh</button>
        <button class="btn" id="btn-apply" style="background:#166534;border-color:#22c55e">Apply</button>
      </div>
    </div>
    <div class="tab-content active" id="tab-fsm"></div>
    <div class="tab-content" id="tab-dsp"></div>
    <div class="tab-content" id="tab-other"></div>
  </div>

  <script>
    const socket = io();

    // ── DOM refs ───────────────────────────────────────────
    const portSelect = document.getElementById('port-select');
    const btnConnect = document.getElementById('btn-connect');
    const btnDisconnect = document.getElementById('btn-disconnect');
    const serialStatus = document.getElementById('serial-status');
    const mqttDot = document.getElementById('mqtt-dot');
    const mqttLabel = document.getElementById('mqtt-label');
    const btnMqttConnect = document.getElementById('btn-mqtt-connect');
    const btnMqttDisconnect = document.getElementById('btn-mqtt-disconnect');
    const logContent = document.getElementById('log-content');
    const chkAutoscroll = document.getElementById('chk-autoscroll');
    const btnClearLog = document.getElementById('btn-clear-log');
    const windowSelect = document.getElementById('window-select');
    const chkAutoscrollGraph = document.getElementById('chk-autoscroll-graph');
    const dataPointsSpan = document.getElementById('data-points');
    const divider = document.getElementById('divider');

    // ── Port listing ──────────────────────────────────────
    function refreshPorts() {
      socket.emit('list_ports');
    }

    socket.on('connect', () => {
      refreshPorts();
      socket.emit('config_request');
    });

    socket.on('port_list', (ports) => {
      const currentVal = portSelect.value;
      portSelect.innerHTML = '<option value="">(select port)</option>' +
        ports.map(p => `<option value="${p.path}">${p.path}${p.manufacturer ? ' — ' + p.manufacturer : ''}</option>`).join('');
      portSelect.value = currentVal;
    });

    // Refresh ports when user opens the dropdown
    portSelect.addEventListener('mousedown', refreshPorts);
    portSelect.addEventListener('focus', refreshPorts);

    // ── Serial connect/disconnect ─────────────────────────
    btnConnect.addEventListener('click', () => {
      const port = portSelect.value;
      if (!port) return;
      btnConnect.disabled = true;
      socket.emit('serial_connect', port);
    });

    btnDisconnect.addEventListener('click', () => {
      socket.emit('serial_disconnect');
    });

    socket.on('serial_status', (status) => {
      if (status.connected) {
        serialStatus.textContent = `✓ ${status.port}`;
        serialStatus.style.color = '#4ade80';
        btnConnect.disabled = true;
        btnDisconnect.disabled = false;
      } else {
        serialStatus.textContent = status.error || 'disconnected';
        serialStatus.style.color = status.error ? '#f87171' : '#94a3b8';
        btnConnect.disabled = false;
        btnDisconnect.disabled = true;
      }
    });

    // ── MQTT connect/disconnect ───────────────────────────
    btnMqttConnect.addEventListener('click', () => {
      socket.emit('mqtt_connect');
      btnMqttConnect.disabled = true;
    });

    btnMqttDisconnect.addEventListener('click', () => {
      socket.emit('mqtt_disconnect');
    });

    socket.on('mqtt_status', (status) => {
      if (status.connected) {
        mqttDot.className = 'status-dot green';
        mqttLabel.textContent = `connected ${status.broker.replace('mqtt://','')}`;
        btnMqttConnect.disabled = true;
        btnMqttDisconnect.disabled = false;
      } else {
        mqttDot.className = 'status-dot red';
        mqttLabel.textContent = 'disconnected';
        btnMqttConnect.disabled = false;
        btnMqttDisconnect.disabled = true;
      }
    });

    // ── Event log ─────────────────────────────────────────
    socket.on('event_log', (entry) => {
      const div = document.createElement('div');
      div.textContent = `[${entry.time}] ${entry.text}`;
      logContent.appendChild(div);
      if (chkAutoscroll.checked) {
        logContent.scrollTop = logContent.scrollHeight;
      }
      while (logContent.children.length > 5000) {
        logContent.removeChild(logContent.firstChild);
      }
    });

    btnClearLog.addEventListener('click', () => {
      logContent.innerHTML = '';
    });

    // ── Divider drag for resizing log pane ──────────────
    let isDragging = false;
    divider.addEventListener('mousedown', (e) => { isDragging = true; e.preventDefault(); });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const logPane = document.querySelector('.log-pane');
      const mainArea = document.querySelector('.main-area');
      const rect = mainArea.getBoundingClientRect();
      const newWidth = Math.max(200, Math.min(rect.width - 200, rect.right - e.clientX));
      logPane.style.width = newWidth + 'px';
      requestAnimationFrame(resizeGraph);
    });
    document.addEventListener('mouseup', () => { isDragging = false; });

    // ── Data Buffers ──────────────────────────────────────
    const MAX_POINTS = 5000;
    const data = {
      time: [],
      main_db: [], sec_db: [], amb_db: [], amb_raw_db: [],
      main_snr: [], sec_snr: [],
      signal: [], cycles: [],
    };
    let stateShapes = [];

    function stateColor(s) {
      switch (s) {
        case 'IDLE': return '#4ade80';
        case 'PROBING': return '#facc15';
        case 'ACTIVE': return '#f87171';
        default: return '#94a3b8';
      }
    }

    // ── Plotly init with empty traces ──────────────────────
    const graphDiv = document.getElementById('plotly-graph');
    const traceDefs = [
      { name: 'main (dB)', color: '#4ade80', dash: 'solid', yaxis: 'y', shape: 'linear', width: 1.5 },
      { name: 'sec (dB)', color: '#60a5fa', dash: 'solid', yaxis: 'y', shape: 'linear', width: 1.5 },
      { name: 'amb (dB)', color: '#94a3b8', dash: 'solid', yaxis: 'y', shape: 'linear', width: 1.5 },
      { name: 'amb_raw (dB)', color: '#64748b', dash: 'dash', yaxis: 'y', shape: 'linear', width: 1.2 },
      { name: 'main_snr', color: '#4ade80', dash: 'dot', yaxis: 'y', shape: 'linear', width: 1 },
      { name: 'sec_snr', color: '#60a5fa', dash: 'dot', yaxis: 'y', shape: 'linear', width: 1 },
      { name: 'signal', color: '#facc15', dash: 'solid', yaxis: 'y2', shape: 'hv', width: 1 },
      { name: 'cycles', color: '#c084fc', dash: 'solid', yaxis: 'y2', shape: 'hv', width: 1 },
    ];
    const NUM = traceDefs.length;

    const initTraces = traceDefs.map(t => ({
      name: t.name, x: [], y: [],
      type: 'scatter', mode: 'lines',
      line: { width: t.width, dash: t.dash, color: t.color, shape: t.shape },
      yaxis: t.yaxis
    }));

    const plotConfig = {
      responsive: true,
      displayModeBar: true,
      modeBarButtonsToRemove: ['lasso2d', 'select2d', 'hoverClosestCartesian', 'hoverCompareCartesian'],
      displaylogo: false
    };

    const layoutBase = {
      title: { text: 'Real-time DSP & FSM Data', font: { color: '#e0e0e0', size: 14 } },
      paper_bgcolor: '#0d1117', plot_bgcolor: '#0d1117',
      font: { color: '#94a3b8' },
      margin: { l: 50, r: 30, t: 30, b: 40 },
      hovermode: 'x unified',
      legend: { font: { color: '#e0e0e0', size: 10 }, orientation: 'h', y: 1.12 },
      dragmode: 'zoom',
      xaxis: { title: 'Time', type: 'date', tickformat: '%H:%M:%S', hoverformat: '%H:%M:%S', color: '#94a3b8', gridcolor: '#1a1a2e', zerolinecolor: '#1a1a2e' },
      yaxis: { title: 'dB', color: '#94a3b8', gridcolor: '#1a1a2e', zerolinecolor: '#1a1a2e', range: [-120, 60] },
      yaxis2: { overlaying: 'y', side: 'right', range: [-0.3, 3.3], showgrid: false, visible: false },
      shapes: []
    };

    Plotly.newPlot(graphDiv, initTraces, layoutBase, plotConfig);

    function resizeGraph() {
      if (!graphDiv) return;
      const rect = graphDiv.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      Plotly.Plots.resize(graphDiv);
    }

    window.addEventListener('load', () => {
      requestAnimationFrame(resizeGraph);
    });
    window.addEventListener('resize', () => {
      requestAnimationFrame(resizeGraph);
    });

    const mainArea = document.querySelector('.main-area');
    if (mainArea && 'ResizeObserver' in window) {
      const mainResizeObserver = new ResizeObserver(() => {
        requestAnimationFrame(resizeGraph);
      });
      mainResizeObserver.observe(mainArea);
    }

    // ── Streaming: restyle from local buffers on each tick ──
    // We buffer in local arrays on each event, then Plotly.restyle all traces
    // at ~60fps via requestAnimationFrame. restyle preserves trace objects
    // (so legend toggle state stays), unlike Plotly.react which replaces them.
    let needsUpdate = false;
    let rafPending = false;

    function tick() {
      rafPending = false;
      if (!needsUpdate) return;
      needsUpdate = false;

      const now = Date.now();
      const ws = parseInt(windowSelect.value) * 1000;

      // Update all traces with current buffered data via restyle
      const fields = [data.main_db, data.sec_db, data.amb_db, data.amb_raw_db, data.main_snr, data.sec_snr, data.signal, data.cycles];
      const time = data.time;
      for (let i = 0; i < NUM; i++) {
        Plotly.restyle(graphDiv, { x: [time], y: [fields[i]] }, i);
      }

      // Update shapes and axis
      const u = { shapes: stateShapes.slice(-200) };
      u['xaxis.type'] = 'date';
      u['xaxis.tickformat'] = '%H:%M:%S';
      if (chkAutoscrollGraph.checked) {
        u['xaxis.range'] = [now - ws, now + 1000];
      } else {
        // Freeze current viewport — re-apply whatever range the graph already has
        const cl = graphDiv.layout;
        if (cl && cl.xaxis && cl.xaxis.range) {
          u['xaxis.range'] = cl.xaxis.range;
        }
      }

      // Add SNR threshold lines
      const mainThresh = paramValues['main_snr_db'] != null ? paramValues['main_snr_db'] : 25.0;
      const secThresh = paramValues['sec_snr_db'] != null ? paramValues['sec_snr_db'] : 22.0;
      const xr = u['xaxis.range'];
      if (xr) {
        u.shapes = u.shapes.concat([
          {
            type: 'line', x0: xr[0], y0: mainThresh, x1: xr[1], y1: mainThresh,
            line: { color: '#4ade80', width: 1, dash: 'dash' },
            opacity: 0.5, layer: 'below'
          },
          {
            type: 'line', x0: xr[0], y0: secThresh, x1: xr[1], y1: secThresh,
            line: { color: '#60a5fa', width: 1, dash: 'dash' },
            opacity: 0.5, layer: 'below'
          }
        ]);
      }
      Plotly.relayout(graphDiv, u);
      dataPointsSpan.textContent = `${time.length} points`;
    }

    function requestTick() {
      needsUpdate = true;
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(tick);
      }
    }

    // ── Socket event handlers ─────────────────────────────
    socket.on('dsp_data', (d) => {
      const t = d.time * 1000;
      data.time.push(t);
      data.main_db.push(d.main_db);
      data.sec_db.push(d.sec_db);
      data.amb_db.push(d.amb_db);
      data.amb_raw_db.push(d.amb_raw_db);
      data.main_snr.push(d.main_snr);
      data.sec_snr.push(d.sec_snr);
      const lastSig = data.signal.length > 0 ? data.signal[data.signal.length - 1] : 0;
      const lastCycles = data.cycles.length > 0 ? data.cycles[data.cycles.length - 1] : 0;
      data.signal.push(lastSig);
      data.cycles.push(lastCycles);
      requestTick();
    });

    socket.on('fsm_data', (d) => {
      const t = d.time * 1000;
      const lastMain = data.main_db.length > 0 ? data.main_db[data.main_db.length - 1] : -120;
      const lastSec = data.sec_db.length > 0 ? data.sec_db[data.sec_db.length - 1] : -120;
      const lastAmb = data.amb_db.length > 0 ? data.amb_db[data.amb_db.length - 1] : -120;
      const lastAmbRaw = data.amb_raw_db.length > 0 ? data.amb_raw_db[data.amb_raw_db.length - 1] : -120;
      data.time.push(t);
      data.main_db.push(lastMain);
      data.sec_db.push(lastSec);
      data.amb_db.push(lastAmb);
      data.amb_raw_db.push(lastAmbRaw);
      data.main_snr.push(d.main_snr);
      data.sec_snr.push(d.sec_snr);
      data.signal.push(d.signal);
      data.cycles.push(d.cycles);
      requestTick();
    });

    let lastStateTime = null;
    let prevState = null;
    let currState = 'IDLE';
    const statePrevName = document.getElementById('state-prev-name');
    const statePrevTime = document.getElementById('state-prev-time');
    const stateCurrName = document.getElementById('state-curr-name');
    const stateCurrTime = document.getElementById('state-curr-time');
    stateCurrName.style.color = stateColor('IDLE');

    function updateStateIndicator(fromState, toState, timeSec) {
      prevState = fromState;
      currState = toState;
      statePrevName.textContent = fromState;
      statePrevName.style.color = stateColor(fromState);
      statePrevTime.textContent = new Date(timeSec * 1000).toLocaleTimeString();
      stateCurrName.textContent = toState;
      stateCurrName.style.color = stateColor(toState);
      stateCurrTime.textContent = new Date(timeSec * 1000).toLocaleTimeString();
    }

    socket.on('state_change', (d) => {
      // Close the previous state span with a proper rectangle
      if (lastStateTime !== null) {
        stateShapes.push({
          type: 'rect',
          x0: lastStateTime,
          y0: -120,
          x1: d.time * 1000,
          y1: 80,
          fillcolor: stateColor(d.from),
          opacity: 0.12,
          line: { width: 0 },
          layer: 'below'
        });
      }
      lastStateTime = d.time * 1000;
      updateStateIndicator(d.from, d.to, d.time);
      // Also log state change
      const div = document.createElement('div');
      div.textContent = `[${new Date(d.time * 1000).toLocaleTimeString()}] [FSM] ${d.from} → ${d.to}`;
      div.style.color = stateColor(d.to);
      logContent.appendChild(div);
      if (chkAutoscroll.checked) logContent.scrollTop = logContent.scrollHeight;
      while (logContent.children.length > 5000) logContent.removeChild(logContent.firstChild);
    });

    // ── Window / autoscroll changes ───────────────────────
    // ── Persisted state ────────────────────────────────────
    const STORAGE_KEY = 'aap-dashboard';

    function loadPersistedState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      return null;
    }

    function savePersistedState(partial) {
      try {
        const current = loadPersistedState() || {};
        Object.assign(current, partial);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(current));
      } catch (_) {}
    }

    const persisted = loadPersistedState();
    const headerDebug = document.getElementById('header-debug-enabled');

    if (persisted && persisted.window_sec) {
      windowSelect.value = String(persisted.window_sec);
    }
    if (persisted && persisted.autoscroll_graph != null) {
      chkAutoscrollGraph.checked = persisted.autoscroll_graph;
    }
    if (persisted && persisted.autoscroll_log != null) {
      chkAutoscroll.checked = persisted.autoscroll_log;
    }
    if (persisted && persisted.debug_enabled != null) {
      headerDebug.checked = persisted.debug_enabled;
    }

    headerDebug.addEventListener('change', () => {
      savePersistedState({ debug_enabled: headerDebug.checked });
    });

    windowSelect.addEventListener('change', () => {
      savePersistedState({ window_sec: parseInt(windowSelect.value) });
      requestTick();
    });
    chkAutoscrollGraph.addEventListener('change', () => {
      savePersistedState({ autoscroll_graph: chkAutoscrollGraph.checked });
      requestTick();
    });
    chkAutoscroll.addEventListener('change', () => {
      savePersistedState({ autoscroll_log: chkAutoscroll.checked });
    });

    // ── Clear Data ────────────────────────────────────────
    document.getElementById('btn-clear-data').addEventListener('click', () => {
      data.time = [];
      data.main_db = []; data.sec_db = []; data.amb_db = []; data.amb_raw_db = [];
      data.main_snr = []; data.sec_snr = [];
      data.signal = []; data.cycles = [];
      stateShapes = [];
      lastStateTime = null;

      // Reset plotly traces to empty
      const emptyTrace = { x: [], y: [] };
      for (let i = 0; i < NUM; i++) {
        Plotly.restyle(graphDiv, emptyTrace, i);
      }
      Plotly.relayout(graphDiv, { shapes: [] });
      dataPointsSpan.textContent = '0 points';
    });

    // ── Parameter Cards ────────────────────────────────────
    const params = [
      // FSM Settings
      { id: 'main_snr_db', label: 'Main SNR', min: 0, max: 50, step: 0.5, default: 25.0, unit: 'dB', tab: 'fsm' },
      { id: 'sec_snr_db', label: 'Sec SNR', min: 0, max: 50, step: 0.5, default: 22.0, unit: 'dB', tab: 'fsm' },
      { id: 'confirm_sec', label: 'Confirm Time', min: 0.1, max: 5.0, step: 0.1, default: 0.7, unit: 's', tab: 'fsm' },
      { id: 'probing_timeout_sec', label: 'Probing Timeout', min: 0.5, max: 10.0, step: 0.1, default: 3.0, unit: 's', tab: 'fsm' },
      { id: 'active_timeout_sec', label: 'Active Timeout', min: 0.5, max: 10.0, step: 0.1, default: 2.5, unit: 's', tab: 'fsm' },
      { id: 'pulse_on_sec', label: 'Pulse On Time', min: 0.05, max: 5.0, step: 0.05, default: 0.60, unit: 's', tab: 'fsm' },
      { id: 'pulse_off_sec', label: 'Pulse Off Time', min: 0.05, max: 5.0, step: 0.05, default: 0.60, unit: 's', tab: 'fsm' },
      { id: 'pulse_tolerance_sec', label: 'Pulse Tolerance', min: 0.05, max: 2.0, step: 0.05, default: 0.20, unit: 's', tab: 'fsm' },
      { id: 'cycle_target_ms', label: 'Cycle Target', min: 100, max: 5000, step: 50, default: 1200, unit: 'ms', tab: 'fsm' },
      { id: 'cycle_tolerance_ms', label: 'Cycle Tolerance', min: 10, max: 2000, step: 10, default: 300, unit: 'ms', tab: 'fsm' },
      { id: 'required_cycles', label: 'Required Cycles', min: 1, max: 10, step: 1, default: 2, unit: '', tab: 'fsm' },
      { id: 'signal_streak_min', label: 'Signal Streak Min', min: 1, max: 20, step: 1, default: 2, unit: 'frames', tab: 'fsm' },

      // DSP Settings
      { id: 'main_freq_hz', label: 'Main Freq', min: 100, max: 5000, step: 1, default: 1253.0, unit: 'Hz', tab: 'dsp' },
      { id: 'sec_freq_hz', label: 'Sec Freq', min: 100, max: 5000, step: 1, default: 662.0, unit: 'Hz', tab: 'dsp' },
      { id: 'amb_freq_hz', label: 'Amb Freq', min: 100, max: 5000, step: 1, default: 900.0, unit: 'Hz', tab: 'dsp' },
      { id: 'alpha_attack', label: 'EMA Attack', min: 0.001, max: 1.0, step: 0.001, default: 0.01, unit: '', tab: 'dsp' },
      { id: 'alpha_decay', label: 'EMA Decay', min: 0.001, max: 1.0, step: 0.001, default: 0.20, unit: '', tab: 'dsp' },

      // System Settings
      { id: 'deep_sleep_enabled', label: 'Deep Sleep Enabled', type: 'checkbox', default: false, tab: 'other' },
      { id: 'sleep_start_hour', label: 'Sleep Start Hour', min: 0, max: 23, step: 1, default: 22, unit: 'h', tab: 'other' },
      { id: 'wake_end_hour', label: 'Wake End Hour', min: 0, max: 23, step: 1, default: 5, unit: 'h', tab: 'other' },
      { id: 'led_enabled', label: 'LED Indicator Enabled', type: 'checkbox', default: true, tab: 'other' },
      { id: 'ota_enabled', label: 'OTA Enabled', type: 'checkbox', default: true, tab: 'other' },
      { id: 'ota_port', label: 'OTA Port', min: 1024, max: 65535, step: 1, default: 3232, unit: '', tab: 'other' }
    ];

    const paramValues = {};
    const tabs = {
      fsm: document.getElementById('tab-fsm'),
      dsp: document.getElementById('tab-dsp'),
      other: document.getElementById('tab-other')
    };

    function decimalPlaces(num) {
      const match = ('' + num).match(/(?:\.(\d+))?(?:[eE]([+-]?\d+))?$/);
      if (!match) { return 0; }
      return Math.max(0, (match[1] ? match[1].length : 0) - (match[2] ? +match[2] : 0));
    }

    params.forEach(p => {
      const saved = persisted && persisted.params && persisted.params[p.id];
      const val = saved != null ? saved : p.default;
      paramValues[p.id] = val;

      const card = document.createElement('div');
      card.className = 'param-card';

      if (p.type === 'checkbox') {
        card.classList.add('checkbox-card');
        card.innerHTML = `
          <label>${p.label}</label>
          <input type="checkbox" id="check-${p.id}" ${val ? 'checked' : ''}>
        `;
        tabs[p.tab].appendChild(card);
        const chk = card.querySelector('input[type="checkbox"]');
        chk.addEventListener('change', () => {
          paramValues[p.id] = chk.checked;
          savePersistedState({ params: { ...paramValues } });
        });
      } else {
        card.innerHTML = `
          <div class="param-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 4px;">
            <label>${p.label}</label>
            <div style="display:flex; align-items:center; gap:4px;">
              <input type="number" id="input-${p.id}" class="param-input" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">
              <span class="unit" style="font-size:10px; color:#94a3b8">${p.unit}</span>
            </div>
          </div>
          <input type="range" id="slider-${p.id}" min="${p.min}" max="${p.max}" step="${p.step}" value="${val}">
        `;
        tabs[p.tab].appendChild(card);

        const slider = card.querySelector('input[type="range"]');
        const input = card.querySelector('input[type="number"]');

        slider.addEventListener('input', () => {
          let v = parseFloat(slider.value);
          if (p.step >= 1) v = Math.round(v);
          paramValues[p.id] = v;
          input.value = p.step >= 1 ? v : v.toFixed(decimalPlaces(p.step));
          savePersistedState({ params: { ...paramValues } });
          requestTick();
        });

        input.addEventListener('change', () => {
          let v = parseFloat(input.value);
          if (isNaN(v)) v = p.default;
          v = Math.max(p.min, Math.min(p.max, v));
          if (p.step >= 1) v = Math.round(v);
          paramValues[p.id] = v;
          input.value = p.step >= 1 ? v : v.toFixed(decimalPlaces(p.step));
          slider.value = v;
          savePersistedState({ params: { ...paramValues } });
          requestTick();
        });
      }
    });

    // ── Tab Selection Logic ────────────────────────────────
    const tabBtns = {
      fsm: document.getElementById('tab-btn-fsm'),
      dsp: document.getElementById('tab-btn-dsp'),
      other: document.getElementById('tab-btn-other')
    };

    const tabContents = {
      fsm: document.getElementById('tab-fsm'),
      dsp: document.getElementById('tab-dsp'),
      other: document.getElementById('tab-other')
    };

    function switchTab(tabName) {
      Object.keys(tabBtns).forEach(key => {
        if (key === tabName) {
          tabBtns[key].classList.add('active');
          tabContents[key].classList.add('active');
        } else {
          tabBtns[key].classList.remove('active');
          tabContents[key].classList.remove('active');
        }
      });
      requestAnimationFrame(resizeGraph);
    }

    Object.keys(tabBtns).forEach(key => {
      tabBtns[key].addEventListener('click', () => switchTab(key));
    });

    // ── Actions: Apply and Refresh ─────────────────────────
    document.getElementById('btn-apply').addEventListener('click', () => {
      const config = {};
      params.forEach(p => {
        if (p.type === 'checkbox') {
          const chk = document.getElementById(`check-${p.id}`);
          config[p.id] = chk ? chk.checked : false;
        } else {
          config[p.id] = paramValues[p.id];
        }
      });
      config.debug_enabled = headerDebug.checked;

      socket.emit('config_update', config);
      const btn = document.getElementById('btn-apply');
      btn.textContent = '✓ Sent';
      btn.style.background = '#14532d';
      setTimeout(() => {
        btn.textContent = 'Apply';
        btn.style.background = '#166534';
      }, 2000);
    });

    document.getElementById('btn-refresh').addEventListener('click', () => {
      socket.emit('config_request');
      const btn = document.getElementById('btn-refresh');
      btn.textContent = '✓ Requested';
      btn.style.background = '#1e3a8a';
      setTimeout(() => {
        btn.textContent = 'Refresh';
        btn.style.background = '#1e3a8a';
      }, 2000);
    });

    // ── Handle incoming configuration acknowledgements ──────
    socket.on('config_ack', (cfg) => {
      console.log('[Config] Ack received:', cfg);

      if (cfg.hasOwnProperty('debug_enabled')) {
        headerDebug.checked = !!cfg.debug_enabled;
      }

      // Update our local parameter values and DOM inputs
      Object.keys(cfg).forEach(key => {
        const paramId = key;
        if (paramValues.hasOwnProperty(paramId)) {
          const val = cfg[key];
          paramValues[paramId] = val;

          const param = params.find(p => p.id === paramId);
          if (param) {
            if (param.type === 'checkbox') {
              const chk = document.getElementById(`check-${paramId}`);
              if (chk) chk.checked = !!val;
            } else {
              const slider = document.getElementById(`slider-${paramId}`);
              const input = document.getElementById(`input-${paramId}`);
              if (slider) slider.value = val;
              if (input) {
                input.value = param.step >= 1 ? val : val.toFixed(decimalPlaces(param.step));
              }
            }
          }
        }
      });

      savePersistedState({ params: { ...paramValues } });
      requestTick();

      // Show notification in event log
      const div = document.createElement('div');
      div.textContent = `[${new Date().toLocaleTimeString()}] [Config] Synced with edge device settings.`;
      div.style.color = '#3b82f6';
      logContent.appendChild(div);
      if (chkAutoscroll.checked) logContent.scrollTop = logContent.scrollHeight;
    });
  </script>
</body>
</html>
